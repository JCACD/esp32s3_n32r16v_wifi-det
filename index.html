<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32-S3 WiFi 訊號監控</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        button { padding: 10px 20px; font-size: 16px; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; display: block; margin: 0 auto 20px; }
        button:hover { background: #2980b9; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        .status { text-align: center; margin-bottom: 20px; font-weight: bold; }
        .connected { color: #2ecc71; }
        .disconnected { color: #e74c3c; }
        .wifi-list { list-style: none; padding: 0; }
        .wifi-item { background: #ecf0f1; margin-bottom: 10px; padding: 15px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .ssid { font-weight: bold; font-size: 1.1em; }
        .rssi { color: #7f8c8d; font-size: 0.9em; }
        .quality-bar { width: 100px; height: 10px; background: #ddd; border-radius: 5px; overflow: hidden; }
        .quality-fill { height: 100%; transition: width 0.3s ease; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ESP32-S3 WiFi 監控</h1>
        <button id="connectBtn">連接 COM5 (USB)</button>
        <div id="status" class="status disconnected">未連接</div>
        <ul id="wifiList" class="wifi-list"></ul>
    </div>

    <script>
        const connectBtn = document.getElementById('connectBtn');
        const statusDiv = document.getElementById('status');
        const wifiList = document.getElementById('wifiList');
        let port;
        let reader;
        let readableStreamClosed;
        let keepReading = true;

        connectBtn.addEventListener('click', async () => {
            if (!('serial' in navigator)) {
                alert('您的瀏覽器不支援 Web Serial API，請使用 Chrome 或 Edge。');
                return;
            }

            try {
                if (!port) {
                    // 請求連接串口
                    port = await navigator.serial.requestPort();
                    await port.open({ baudRate: 115200 });
                    
                    connectBtn.textContent = '断开連接';
                    statusDiv.textContent = '已連接';
                    statusDiv.className = 'status connected';
                    keepReading = true;
                    readLoop();
                } else {
                    // 斷開連接
                    keepReading = false;
                    await reader.cancel();
                    await readableStreamClosed.catch(() => {});
                    await port.close();
                    port = null;
                    
                    connectBtn.textContent = '連接 COM5 (USB)';
                    statusDiv.textContent = '未連接';
                    statusDiv.className = 'status disconnected';
                    wifiList.innerHTML = '';
                }
            } catch (error) {
                console.error(error);
                statusDiv.textContent = '連接失敗: ' + error.message;
            }
        });

        async function readLoop() {
            const textDecoder = new TextDecoderStream();
            readableStreamClosed = port.readable.pipeTo(textDecoder.writable);
            reader = textDecoder.readable.getReader();

            let buffer = '';
            try {
                while (keepReading) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    buffer += value;
                    let lines = buffer.split('\n');
                    buffer = lines.pop(); // 保留最後一個不完整的行

                    for (let line of lines) {
                        line = line.trim();
                        if (line.startsWith('{') && line.endsWith('}')) {
                            try {
                                const data = JSON.parse(line);
                                updateUI(data);
                            } catch (e) {
                                console.warn('JSON 解析失敗:', line);
                            }
                        }
                    }
                }
            } catch (error) {
                console.error('讀取錯誤:', error);
            } finally {
                reader.releaseLock();
            }
        }

        function updateUI(data) {
            let item = document.getElementById(`wifi-${data.ssid}`);
            if (!item) {
                item = document.createElement('li');
                item.id = `wifi-${data.ssid}`;
                item.className = 'wifi-item';
                item.innerHTML = `
                    <div>
                        <div class="ssid">${data.ssid}</div>
                        <div class="rssi">RSSI: ${data.rssi} dBm</div>
                    </div>
                    <div class="quality-bar">
                        <div class="quality-fill"></div>
                    </div>
                `;
                wifiList.appendChild(item);
            } else {
                item.querySelector('.rssi').textContent = `RSSI: ${data.rssi} dBm`;
            }
            
            // 更新訊號強度條
            const fill = item.querySelector('.quality-fill');
            fill.style.width = `${data.quality}%`;
            
            // 根據強弱改變顏色
            if (data.quality >= 70) fill.style.backgroundColor = '#2ecc71'; // 綠
            else if (data.quality >= 40) fill.style.backgroundColor = '#f1c40f'; // 黃
            else fill.style.backgroundColor = '#e74c3c'; // 紅
        }
    </script>
</body>
</html>
