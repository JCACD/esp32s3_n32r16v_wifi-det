name: Build ESP32-S3 Firmware

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Arduino CLI
      uses: arduino/setup-arduino-cli@v2

    - name: Install ESP32 Core
      run: |
        arduino-cli config init
        arduino-cli config add board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
        arduino-cli core update-index
        arduino-cli core install esp32:esp32

    - name: Compile Sketch for ESP32-S3 N32R16V
      run: |
        # 1. 自動尋找根目錄下的 .ino 檔案
        INO_FILE=$(find . -maxdepth 1 -name "*.ino" | head -n 1)

        if [ -z "$INO_FILE" ]; then
          echo "❌ 錯誤: 在根目錄找不到 .ino 檔案"
          exit 1
        fi
        echo "✅ 找到程式碼檔案: $INO_FILE"

        # 2. 取得檔案名稱（不含副檔名）
        SKETCH_NAME=$(basename "$INO_FILE" .ino)
        echo "📁 Sketch 名稱: $SKETCH_NAME"

        # 3. 建立與 .ino 同名的子資料夾
        SKETCH_DIR="sketch/${SKETCH_NAME}"
        mkdir -p "$SKETCH_DIR"

        # 4. 將 .ino 檔案複製到正確的資料夾中
        cp "$INO_FILE" "${SKETCH_DIR}/${SKETCH_NAME}.ino"

        # 5. 編譯 (已修正 PartitionScheme 為 default)
        mkdir -p build
        arduino-cli compile \
          --fqbn esp32:esp32:esp32s3:CDCOnBoot=cdc,FlashSize=32M,PSRAM=opi,PartitionScheme=default \
          --build-property "build.extra_flags=-DBOARD_HAS_PSRAM" \
          --output-dir build \
          "$SKETCH_DIR"

    - name: Upload .bin Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ESP32-S3-WiFi-Scanner-Bin
        path: build/*.bin
