name: Build ESP32-S3 Firmware

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # 允許手動觸發

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Arduino CLI
      uses: arduino/setup-arduino-cli@v2

    - name: Install ESP32 Core
      run: |
        arduino-cli config init
        arduino-cli config add board_manager.additional_urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
        arduino-cli core update-index
        arduino-cli core install esp32:esp32

    - name: Compile Sketch for ESP32-S3 N32R16V
      run: |
        # 自動尋找根目錄下的第一個 .ino 檔案
        INO_FILE=$(find . -maxdepth 1 -name "*.ino" | head -n 1)
        
        # 檢查是否找到檔案
        if [ -z "$INO_FILE" ]; then
          echo "❌ 錯誤: 在根目錄找不到 .ino 檔案，請確認已上傳程式碼。"
          exit 1
        fi
        echo "✅ 找到程式碼檔案: $INO_FILE"
        
        mkdir -p build
        
        # 編譯指令 (已修正 PartitionScheme 參數為 default_32MB)
        arduino-cli compile \
          --fqbn esp32:esp32:esp32s3:CDCOnBoot=cdc,FlashSize=32M,PSRAM=opi,PartitionScheme=default_32MB \
          --build-property "build.extra_flags=-DBOARD_HAS_PSRAM" \
          --output-dir build \
          "$INO_FILE"

    - name: Upload .bin Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ESP32-S3-WiFi-Scanner-Bin
        path: build/*.bin
